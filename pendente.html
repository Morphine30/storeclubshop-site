<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pagamento Pendente — Story Club Shop</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:#0a0a0a; }
    .msg-box { text-align:center; padding:48px 32px; background:#111; border-radius:16px; max-width:480px; }
    .msg-icon { font-size:72px; margin-bottom:16px; }
    .msg-box h1 { color:#f59e0b; margin-bottom:8px; }
    .msg-box p { color:#aaa; margin-bottom:24px; }
    .btn-home { display:inline-block; background:#7c3aed; color:#fff; padding:12px 28px; border-radius:8px; text-decoration:none; font-weight:700; }
  </style>
</head>
<body>
  <div class="msg-box">
    <div class="msg-icon">⏳</div>
    <h1>Pagamento Pendente</h1>
    <p>Seu pagamento está sendo processado. Assim que confirmado, você receberá uma notificação.</p>
    <a href="index.html" class="btn-home">Voltar à Loja</a>
  </div>
</body>
</html>
